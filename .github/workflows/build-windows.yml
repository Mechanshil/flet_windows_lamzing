name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Build Flet app for Windows
        run: |
          flet build windows --project flet_windows_lamzing --yes

      - name: List build output
        run: |
          Get-ChildItem -Recurse build\ | Select-Object FullName

      - name: Upload build output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build\flutter\build\windows\x64\runner\Release\